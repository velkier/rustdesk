 vcpkg_local
          cd vcpkg_local
          ./bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=$PWD" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Build and Package Windows
        shell: pwsh
        run: |
          flutter pub get
          python res/build.py --target ${{ matrix.target }}
          
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-${{ matrix.target }}
          path: |
            build/windows/runner/Release/*.exe
            dist/*.exe

  build-for-linux:
    name: Linux Debian Build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Inject custom server
        run: |
          echo "RUSTDESK_ID_SERVER=${{ env.RUSTDESK_ID_SERVER }}" >> $GITHUB_ENV
          echo "RUSTDESK_KEY=${{ env.RUSTDESK_KEY }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++6 python3-pip

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.rust_version }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}

      - name: Build Linux Package
        run: |
          # Provjera strukture i automatsko pozicioniranje u korijen projekta
          flutter pub get
          if [ -d "flutter" ]; then
            cd flutter
            flutter pub get
            python3 ../res/build.py --target x86_64-unknown-linux-gnu
          else
            python3 res/build.py --target x86_64-unknown-linux-gnu
          fi

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-linux-deb
          path: |
            *.deb
            dist/*.deb
