name: Custom RustDesk Build

on:
  workflow_dispatch:

env:
  RUSTDESK_ID_SERVER: "167.233.51.96"
  RUSTDESK_KEY: "hbU4D9qK5zXR5NXPoAdHzUSL42hgT1kG+jw9lpEooJ0="
  flutter_version: "3.22.2"
  rust_version: "1.79.0"

jobs:
  build-for-windows-flutter:
    name: Windows Build
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-pc-windows-msvc, i686-pc-windows-msvc]
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Inject custom server
        shell: bash
        run: |
          echo "RUSTDESK_ID_SERVER=${{ env.RUSTDESK_ID_SERVER }}" >> $GITHUB_ENV
          echo "RUSTDESK_KEY=${{ env.RUSTDESK_KEY }}" >> $GITHUB_ENV

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.rust_version }}
          targets: ${{ matrix.target }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}

      - name: Install Vcpkg
        shell: pwsh
        run: |
          git clone https://github.com
          ./vcpkg/bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=$(Get-Location)/vcpkg" >> $env:GITHUB_ENV

      - name: Build and Package Windows
        shell: pwsh
        run: |
          flutter pub get
          python res/build.py --target ${{ matrix.target }}
          
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-${{ matrix.target }}
          path: |
            build/windows/runner/Release/*.exe
            dist/*.exe

  build-for-linux:
    name: Linux Debian Build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Inject custom server
        run: |
          echo "RUSTDESK_ID_SERVER=${{ env.RUSTDESK_ID_SERVER }}" >> $GITHUB_ENV
          echo "RUSTDESK_KEY=${{ env.RUSTDESK_KEY }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++6 python3-pip

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.rust_version }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}

      - name: Build Linux Package
        run: |
          flutter pub get
          python3 res/build.py --target x86_64-unknown-linux-gnu

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-linux-deb
          path: |
            *.deb
            dist/*.deb
