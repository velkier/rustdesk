name: Custom RustDesk Build

on:
  workflow_dispatch:

env:
  RUSTDESK_ID_SERVER: "167.233.51.96"
  RUSTDESK_KEY: "hbU4D9qK5zXR5NXPoAdHzUSL42hgT1kG+jw9lpEooJ0="

jobs:
  # 1. POPRAVLJENO GENERIRANJE MOSTOVA (Točni parametri --rust-crate-dir)
  generate-bridge:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build bridge
        run: |
          cd flutter
          flutter pub get
          cargo install flutter_rust_bridge_codegen --version 1.80.0 --bin flutter_rust_bridge_codegen
          flutter_rust_bridge_codegen --rust-input ../src/main.rs --dart-output lib/generated_bridge.dart --rust-crate-dir ../

  # 2. WINDOWS FLUTTER BUILD
  build-for-windows-flutter:
    name: Build Windows
    needs: [generate-bridge]
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        job:
          - { target: x86_64-pc-windows-msvc, os: windows-2022, arch: x86_64, vcpkg-triplet: x64-windows-static }
          - { target: i686-pc-windows-msvc, os: windows-2022, arch: x86, vcpkg-triplet: x86-windows-static }
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Inject custom server
        shell: bash
        run: |
          echo "RUSTDESK_ID_SERVER=${{ env.RUSTDESK_ID_SERVER }}" >> $GITHUB_ENV
          echo "RUSTDESK_KEY=${{ env.RUSTDESK_KEY }}" >> $GITHUB_ENV

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.job.target }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          git clone https://github.com vcpkg
          ./vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=$PWD/vcpkg" >> $GITHUB_ENV
          ./vcpkg/vcpkg install libvpx:${{ matrix.job.vcpkg-triplet }} libyuv:${{ matrix.job.vcpkg-triplet }} opus:${{ matrix.job.vcpkg-triplet }} aom:${{ matrix.job.vcpkg-triplet }}

      - name: Build Windows Application
        shell: bash
        run: |
          cd flutter
          flutter pub get
          flutter build windows --release

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-${{ matrix.job.arch }}
          path: flutter/build/windows/runner/Release/

  # 3. LINUX DEBIAN BUILD
  build-for-linux-debian:
    name: Build Linux Debian
    needs: [generate-bridge]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Inject custom server
        run: |
          echo "RUSTDESK_ID_SERVER=${{ env.RUSTDESK_ID_SERVER }}" >> $GITHUB_ENV
          echo "RUSTDESK_KEY=${{ env.RUSTDESK_KEY }}" >> $GITHUB_ENV

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install vcpkg dependencies
        run: |
          git clone https://github.com vcpkg
          ./vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=$PWD/vcpkg" >> $GITHUB_ENV
          ./vcpkg/vcpkg install libvpx libyuv opus aom

      - name: Build Linux Application
        run: |
          cd flutter
          flutter pub get
          flutter build linux --release

      - name: Package as Debian (.deb)
        run: |
          cd flutter
          if [ -f "res/build.sh" ]; then
            bash res/build.sh
          else
            mkdir -p dist
            cp -r build/linux/x64/release/bundle/* dist/
          fi

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-linux-debian
          path: |
            flutter/*.deb
            flutter/dist/
