name: Custom RustDesk Build (Windows & Linux Only)

on:
  workflow_dispatch: # Omogućuje ručno pokretanje na gumb u GitHub Actions

env:
  RUSTDESK_ID_SERVER: "167.233.51.96"
  RUSTDESK_KEY: "hbU4D9qK5zXR5NXPoAdHzUSL42hgT1kG+jw9lpEooJ0="

jobs:
  # 1. POSAO ZA GENERIRANJE MOSTOVA (Potrebno za Rust/Flutter komunikaciju)
  generate-bridge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies and bridge tools
        run: |
          cargo install flutter_rust_bridge_codegen --version 1.80.0 || true
          flutter pub get
          flutter_rust_bridge_codegen --rust-input src/main.rs --flutter-output lib/generated_bridge.dart

  # 2. POSAO ZA WINDOWS BUILD (x64 i x86)
  build-for-windows:
    needs: [generate-bridge]
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-pc-windows-msvc, i686-pc-windows-msvc]
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # PRVI KORAK - Ubrizgavanje servera i ključa izravno u varijable okruženja
      - name: Inject custom server
        shell: bash
        run: |
          echo "RUSTDESK_ID_SERVER=${{ env.RUSTDESK_ID_SERVER }}" >> $GITHUB_ENV
          echo "RUSTDESK_KEY=${{ env.RUSTDESK_KEY }}" >> $GITHUB_ENV

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install vcpkg dependencies
        shell: pwsh
        run: |
          git clone https://github.com
          ./vcpkg/bootstrap-vcpkg.bat
          $env:VCPKG_ROOT = "$(Get-Location)/vcpkg"
          echo "VCPKG_ROOT=$env:VCPKG_ROOT" >> $env:GITHUB_ENV
          if ("${{ matrix.target }}" -eq "x86_64-pc-windows-msvc") {
            ./vcpkg/vcpkg install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static
          } else {
            ./vcpkg/vcpkg install libvpx:x86-windows-static libyuv:x86-windows-static opus:x86-windows-static aom:x86-windows-static
          }

      - name: Build Flutter Windows Application
        shell: pwsh
        run: |
          flutter build windows --release

      # KLJUČNI KORAK - Slanje .exe datoteke na GitHub sučelje da je možete preuzeti
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-windows-${{ matrix.target }}
          path: build/windows/runner/Release/

  # 3. POSAO ZA LINUX DEBIAN BUILD (.deb)
  build-for-linux-debian:
    needs: [generate-bridge]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # PRVI KORAK - Ubrizgavanje servera i ključa
      - name: Inject custom server
        run: |
          echo "RUSTDESK_ID_SERVER=${{ env.RUSTDESK_ID_SERVER }}" >> $GITHUB_ENV
          echo "RUSTDESK_KEY=${{ env.RUSTDESK_KEY }}" >> $GITHUB_ENV

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install vcpkg dependencies
        run: |
          git clone https://github.com
          ./vcpkg/bootstrap-vcpkg.sh
          export VCPKG_ROOT=$PWD/vcpkg
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> $GITHUB_ENV
          ./vcpkg/vcpkg install libvpx libyuv opus aom

      - name: Build Flutter Linux
        run: |
          flutter build linux --release

      - name: Package as Debian (.deb)
        run: |
          # RustDesk koristi skripte za izradu .deb paketa unutar resursa, pokrećemo je ovdje
          if [ -f "res/build.sh" ]; then
            bash res/build.sh
          else
            mkdir -p dist
            cp -r build/linux/x64/release/bundle/* dist/
          fi

      # KLJUČNI KORAK - Slanje .deb datoteke na GitHub sučelje za preuzimanje
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-linux-debian
          path: |
            *.deb
            dist/
